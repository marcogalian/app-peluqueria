version: '3.8'

services:
  db:
    image: postgres:15
    container_name: peluqueria-db
    environment:
      POSTGRES_USER: 2DAM
      POSTGRES_PASSWORD: secret123
      POSTGRES_DB: peluqueria_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U 2DAM -d peluqueria_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ../backend-spring
      dockerfile: Dockerfile
    container_name: peluqueria-api
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/peluqueria_db
      SPRING_DATASOURCE_USERNAME: 2DAM
      SPRING_DATASOURCE_PASSWORD: secret123
      UPLOADS_DIR: /app/uploads
      # Ajusta estos valores con tus credenciales reales
      MAILTRAP_HOST: sandbox.smtp.mailtrap.io
      MAILTRAP_PORT: 2525
      MAILTRAP_USERNAME: 51e106a28faced
      MAILTRAP_PASSWORD: f9e4285727d31a
      GEMINI_API_KEY: AIzaSyChUdFxLTKRY4yiXh0qOrCx6roNf3p5Wzw
      JWT_SECRET_KEY: 4f8b9c2e7a1d6f3b8e5c2a9d4b7e1f6c3a8d5b2e9f4c1a6d3b8e5f2c9a4d1b6e
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    restart: always

  front:
    build:
      context: ../front-nuxt
      dockerfile: Dockerfile
    container_name: peluqueria-front
    ports:
      - "3000:3000"
    environment:
      NUXT_PUBLIC_API_BASE: http://localhost:8080/api
    depends_on:
      - api
    restart: always

volumes:
  postgres_data:
  uploads_data:
