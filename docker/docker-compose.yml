services:
  db:
    image: postgres:15
    container_name: peluqueria-db
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ../backend-spring
      dockerfile: Dockerfile
    container_name: peluqueria-api
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${DB_NAME}
      SPRING_DATASOURCE_USERNAME: ${DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      UPLOADS_DIR: /app/uploads
      MAILTRAP_HOST: sandbox.smtp.mailtrap.io
      MAILTRAP_PORT: 2525
      MAILTRAP_USERNAME: ${MAILTRAP_USERNAME}
      MAILTRAP_PASSWORD: ${MAILTRAP_PASSWORD}
      APP_ADMIN_EMAIL: ${APP_ADMIN_EMAIL:-admin@email.com}
      APP_FRONTEND_BASE_URL: ${FRONTEND_BASE_URL:-http://localhost:3000}
      AI_PROVIDER: ${AI_PROVIDER:-spring-ai}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      OPENAI_MAX_TOKENS: ${OPENAI_MAX_TOKENS:-200}
      SPRING_AI_MODEL_CHAT: ${SPRING_AI_MODEL_CHAT:-none}
      CHATBOT_CONTEXT_FILE: /app/data/chatbot/contexto-negocio.json
      SWAGGER_ENABLED: ${SWAGGER_ENABLED:-false}
      ANTI_ABUSE_ENABLED: ${ANTI_ABUSE_ENABLED:-true}
      ANTI_ABUSE_GENERAL_PER_MINUTE: ${ANTI_ABUSE_GENERAL_PER_MINUTE:-240}
      ANTI_ABUSE_AUTH_PER_MINUTE: ${ANTI_ABUSE_AUTH_PER_MINUTE:-20}
      ANTI_ABUSE_CHAT_PER_MINUTE: ${ANTI_ABUSE_CHAT_PER_MINUTE:-8}
      ANTI_ABUSE_TRUST_FORWARDED_FOR: ${ANTI_ABUSE_TRUST_FORWARDED_FOR:-false}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      CHAT_AES_KEY: ${CHAT_AES_KEY}
      APP_DEMO_PASSWORD: ${APP_DEMO_PASSWORD}
      APP_SYNC_DEMO_PASSWORDS: ${APP_SYNC_DEMO_PASSWORDS:-true}
    volumes:
      - uploads_data:/app/uploads
      - ../backend-spring/data:/app/data
    depends_on:
      db:
        condition: service_healthy
    restart: always

  front:
    build:
      context: ../front-nuxt
      dockerfile: Dockerfile
    container_name: peluqueria-front
    ports:
      - "3000:3000"
    environment:
      NUXT_PUBLIC_API_BASE: http://localhost:8080/api
    depends_on:
      - api
    restart: always

volumes:
  postgres_data:
  uploads_data:
