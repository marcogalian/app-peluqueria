# ── Base de datos ─────────────────────────────────────────────
# Credenciales por env vars (ver .env). Defaults solo para dev local.
spring.datasource.url=jdbc:postgresql://localhost:5432/${DB_NAME:peluqueria_db}
spring.datasource.username=${DB_USER:2DAM}
spring.datasource.password=${DB_PASSWORD:}

# ── JPA ───────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
# show-sql desactivado en prod por defecto. Activar solo en dev: SHOW_SQL=true
spring.jpa.show-sql=${SHOW_SQL:false}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ── Email (Mailtrap Sandbox) ──────────────────────────────────
spring.mail.host=${MAILTRAP_HOST:sandbox.smtp.mailtrap.io}
spring.mail.port=${MAILTRAP_PORT:2525}
spring.mail.username=${MAILTRAP_USERNAME:}
spring.mail.password=${MAILTRAP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ── Contacto admin para alertas ───────────────────────────────
app.admin.email=${APP_ADMIN_EMAIL:admin@peluqueria.com}
app.seed.demo-password=${APP_DEMO_PASSWORD:}

# ── Cache en memoria ──────────────────────────────────────────
spring.cache.type=simple

# ── Uploads de fotos ──────────────────────────────────────────
uploads.dir=${UPLOADS_DIR:uploads}
spring.web.resources.static-locations=classpath:/static/,file:./uploads/
# Limite de tamano por archivo subido
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB

# ── Swagger / OpenAPI ─────────────────────────────────────────
# En prod: SWAGGER_ENABLED=false para no exponer la documentacion publica.
springdoc.swagger-ui.enabled=${SWAGGER_ENABLED:true}
springdoc.api-docs.enabled=${SWAGGER_ENABLED:true}
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.operations-sorter=method

# ── JWT ───────────────────────────────────────────────────────
# Obligatorio: secret aleatorio >= 32 bytes. Sin default por seguridad.
application.security.jwt.secret-key=${JWT_SECRET_KEY:}
application.security.jwt.expiration=7200000

# ── AES (chat interno cifrado) ────────────────────────────────
# Obligatorio. Sin default para que no se firme con clave publica.
chat.aes.secret-key=${CHAT_AES_KEY:}

# ── AI Chatbot ─────────────────────────────────────────────────
ai.provider=${AI_PROVIDER:gemini}

# Gemini
gemini.api.key=${GEMINI_API_KEY:}
gemini.model=gemini-2.5-flash

# OpenRouter
openrouter.api.key=${OPENROUTER_API_KEY:}
openrouter.model=${OPENROUTER_MODEL:openrouter/free}
openrouter.site.url=${OPENROUTER_SITE_URL:http://localhost:3000}
openrouter.app.name=${OPENROUTER_APP_NAME:Peluqueria Isabella}
