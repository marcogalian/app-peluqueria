# CONEXION A LA BASE DE DATOS QUE HE CREADO
spring.datasource.url=jdbc:postgresql://localhost:5432/peluqueria_db
spring.datasource.username=2DAM
spring.datasource.password=secret123

#JPA CREA LAS TABLAS AUTOMATICAMENTE
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# CONFIGURACION DE EMAIL RECORDATORIOS (Mailtrap Sandbox)
spring.mail.host=${MAILTRAP_HOST:sandbox.smtp.mailtrap.io}
spring.mail.port=${MAILTRAP_PORT:2525}
spring.mail.username=${MAILTRAP_USERNAME:}
spring.mail.password=${MAILTRAP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Twilio WhatsApp Integration (HU12)
twilio.account.sid=${TWILIO_ACCOUNT_SID:}
twilio.auth.token=${TWILIO_AUTH_TOKEN:}
twilio.whatsapp.from=${TWILIO_WHATSAPP_FROM:}

# Almacenamiento local de fotos de clientes
uploads.dir=${UPLOADS_DIR:uploads}
spring.web.resources.static-locations=classpath:/static/,file:./uploads/
