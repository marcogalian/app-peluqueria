# ── Base de datos ─────────────────────────────────────────────
# Credenciales obligatorias por env vars (ver docker/.env.example).
spring.datasource.url=jdbc:postgresql://localhost:5432/${DB_NAME:peluqueria_db}
spring.datasource.username=${DB_USER:}
spring.datasource.password=${DB_PASSWORD:}

# ── JPA ───────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
# show-sql desactivado en prod por defecto. Activar solo en dev: SHOW_SQL=true
spring.jpa.show-sql=${SHOW_SQL:false}
spring.jpa.open-in-view=false

# ── Email (Mailtrap Sandbox) ──────────────────────────────────
spring.mail.host=${MAILTRAP_HOST:sandbox.smtp.mailtrap.io}
spring.mail.port=${MAILTRAP_PORT:2525}
spring.mail.username=${MAILTRAP_USERNAME:}
spring.mail.password=${MAILTRAP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ── Contacto admin para alertas ───────────────────────────────
app.admin.email=${APP_ADMIN_EMAIL:admin@email.com}
app.frontend.base-url=${FRONTEND_BASE_URL:http://localhost:3000}
app.seed.demo-password=${APP_DEMO_PASSWORD:}
app.seed.sync-demo-passwords=${APP_SYNC_DEMO_PASSWORDS:false}

# ── Cache en memoria ──────────────────────────────────────────
spring.cache.type=simple

# ── Uploads de fotos ──────────────────────────────────────────
uploads.dir=${UPLOADS_DIR:uploads}
spring.web.resources.static-locations=classpath:/static/,file:./uploads/
# Limite de tamano por archivo subido
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB
# En prod: ERROR_INCLUDE_MESSAGE=never para no exponer mensajes internos.
server.error.include-message=${ERROR_INCLUDE_MESSAGE:never}

# ── Anti-abuso / coste ───────────────────────────────────────
app.security.anti-abuse.enabled=${ANTI_ABUSE_ENABLED:true}
app.security.anti-abuse.general-per-minute=${ANTI_ABUSE_GENERAL_PER_MINUTE:240}
app.security.anti-abuse.auth-per-minute=${ANTI_ABUSE_AUTH_PER_MINUTE:20}
app.security.anti-abuse.chat-per-minute=${ANTI_ABUSE_CHAT_PER_MINUTE:8}
app.security.anti-abuse.trust-forwarded-for=${ANTI_ABUSE_TRUST_FORWARDED_FOR:false}
logging.level.org.springframework.security.config.annotation.authentication.configuration.InitializeUserDetailsBeanManagerConfigurer=ERROR

# ── CORS ──────────────────────────────────────────────────────
# Lista de orígenes separados por coma. En prod: CORS_ORIGINS=https://tu-dominio.com
cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000,http://localhost:5173,http://localhost:4000,http://peluqueria-front:3000}

# ── Swagger / OpenAPI ─────────────────────────────────────────
# En prod: SWAGGER_ENABLED permanece false. Activar explícitamente en dev si se necesita.
springdoc.swagger-ui.enabled=${SWAGGER_ENABLED:false}
springdoc.api-docs.enabled=${SWAGGER_ENABLED:false}
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.operations-sorter=method

# ── JWT ───────────────────────────────────────────────────────
# Obligatorio: secret aleatorio >= 32 bytes. Sin default por seguridad.
application.security.jwt.secret-key=${JWT_SECRET_KEY:}
application.security.jwt.expiration=7200000

# ── AES (chat interno cifrado) ────────────────────────────────
# Obligatorio. Sin default para que no se firme con clave publica.
chat.aes.secret-key=${CHAT_AES_KEY:}

# ── AI Chatbot ─────────────────────────────────────────────────
ai.provider=${AI_PROVIDER:spring-ai}
# JSON visible con el conocimiento estatico que se inyecta al system prompt.
# Se regenera al arrancar, cada noche y desde POST /api/chat/regenerar-contexto.
chatbot.context-file=${CHATBOT_CONTEXT_FILE:./data/chatbot/contexto-negocio.json}

# Spring AI con OpenAI.
spring.ai.model.chat=${SPRING_AI_MODEL_CHAT:none}
spring.ai.model.embedding=none
spring.ai.model.image=none
spring.ai.model.moderation=none
spring.ai.model.audio.speech=none
spring.ai.model.audio.transcription=none
spring.ai.openai.api-key=${OPENAI_API_KEY:}
spring.ai.openai.chat.options.model=${OPENAI_MODEL:gpt-4o-mini}
spring.ai.openai.chat.options.temperature=0.2
spring.ai.openai.chat.options.max-tokens=${OPENAI_MAX_TOKENS:200}
spring.autoconfigure.exclude=org.springframework.ai.model.openai.autoconfigure.OpenAiAudioSpeechAutoConfiguration,org.springframework.ai.model.openai.autoconfigure.OpenAiAudioTranscriptionAutoConfiguration,org.springframework.ai.model.openai.autoconfigure.OpenAiEmbeddingAutoConfiguration,org.springframework.ai.model.openai.autoconfigure.OpenAiImageAutoConfiguration,org.springframework.ai.model.openai.autoconfigure.OpenAiModerationAutoConfiguration
